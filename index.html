<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="login-page">

    <div class="login-container">
      <h1>どなたでログインしますか？</h1>

      <div class="user-list">
        
        <div class="user" onclick="login('N')">
          <img src="images/n.png">
          <p> </p>
        </div>

        <div class="user" onclick="login('F')">
          <img src="images/f.png">
          <p> </p>
        </div>

        <div class="user" onclick="login('Yu')">
          <img src="images/yu.png">
          <p> </p>
        </div>

        <div class="user" onclick="login('H')">
          <img src="images/h.jpg">
          <p> </p>
        </div>

        <div class="user" onclick="login('C')">
          <img src="images/c.jpg">
          <p> </p>
        </div>

        <div class="user" onclick="login('冨田')">
          <img src="images/tomita.png">
          <p> </p>
        </div>

      </div>
    </div>

<script>
function login(name) {
  window.location.href = "welcome.html?user=" + encodeURIComponent(name);
}
</script>
  </body>
</html>
